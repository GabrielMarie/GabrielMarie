<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Three amélioré</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.75);
      padding: 12px 14px;
      border-radius: 10px;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">Chargement…</div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { HDRLoader } from "three/addons/loaders/HDRLoader.js";
    import { PMREMGenerator } from "three";
    import { LineSegments2 } from "three/addons/lines/LineSegments2.js";
    import { LineSegmentsGeometry } from "three/addons/lines/LineSegmentsGeometry.js";
    import { LineMaterial } from "three/addons/lines/LineMaterial.js";

    const info = document.getElementById("info");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      40,
      window.innerWidth / window.innerHeight,
      0.01,
      1000
    );
    camera.position.set(2, 1.5, 2);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance"
    });

    // Augmente un peu la résolution, sans exploser la charge GPU
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Réglages de rendu plus beaux
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = false;

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(4, 5, 3);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xbfd6ff, 0.8);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    const pmrem = new PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();

    // HDRI pour un rendu plus proche d’un viewer CAD / studio
    new HDRLoader().load(
      "https://threejs.org/examples/textures/equirectangular/blouberg_sunrise_2_1k.hdr",
      (hdrTexture) => {
        hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
        const envMap = pmrem.fromEquirectangular(hdrTexture).texture;
        scene.environment = envMap;
        hdrTexture.dispose();
        pmrem.dispose();
        render();
      }
    );

    let model = null;

    function addThinEdges(mesh) {
      const edges = new THREE.EdgesGeometry(mesh.geometry, 28);
      const pos = edges.attributes.position.array;

      const lineGeometry = new LineSegmentsGeometry();
      lineGeometry.setPositions(pos);

      const lineMaterial = new LineMaterial({
        color: 0x111111,
        linewidth: 1.2,   // plus fin
        worldUnits: false,
        transparent: true,
        opacity: 0.9,
        alphaToCoverage: true
      });

      lineMaterial.resolution.set(window.innerWidth, window.innerHeight);

      const lines = new LineSegments2(lineGeometry, lineMaterial);
      lines.computeLineDistances();
      mesh.add(lines);
    }

    function improveMaterial(mesh) {
      if (!mesh.material) return;

      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];

      for (const mat of mats) {
        if ("envMapIntensity" in mat) mat.envMapIntensity = 1.6;
        if ("roughness" in mat) mat.roughness = Math.min(mat.roughness ?? 1, 0.28);
        if ("metalness" in mat) mat.metalness = Math.max(mat.metalness ?? 0, 0.08);

        // Option glossy plus fort
        if (mat.isMeshStandardMaterial) {
          const better = new THREE.MeshPhysicalMaterial();
          better.copy(mat);
          better.envMapIntensity = 1.6;
          better.roughness = Math.min(mat.roughness ?? 1, 0.24);
          better.metalness = Math.max(mat.metalness ?? 0, 0.08);
          better.clearcoat = 0.35;
          better.clearcoatRoughness = 0.18;
          better.reflectivity = 0.65;
          mesh.material = better;
        }
      }
    }

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = THREE.MathUtils.degToRad(camera.fov);
      let distance = maxDim / (2 * Math.tan(fov / 2));
      distance *= 1.5;

      camera.position.set(center.x + distance, center.y + distance * 0.55, center.z + distance);
      controls.target.copy(center);
      controls.update();
    }

    const loader = new GLTFLoader();
    loader.load(
      "./robot.gltf",
      (gltf) => {
        model = gltf.scene;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        model.traverse((child) => {
          if (child.isMesh) {
            improveMaterial(child);
            addThinEdges(child);
          }
        });

        fitCameraToObject(model);
        info.textContent = "Robot chargé.";
        render();
      },
      undefined,
      (error) => {
        console.error(error);
        info.textContent = "Erreur: impossible de charger robot.glb";
      }
    );

    function render() {
      renderer.render(scene, camera);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      render();
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      scene.traverse((obj) => {
        if (obj.material && obj.material.isLineMaterial) {
          obj.material.resolution.set(window.innerWidth, window.innerHeight);
        }
      });

      render();
    });
  </script>
</body>
</html>
