<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STL Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #f5f6f3;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #viewer {
      width: 100vw;
      height: 100vh;
    }

    .label {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="label">BD-1 STL Viewer</div>
  <div id="viewer"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";
    import { STLLoader } from "https://unpkg.com/three@0.161.0/examples/jsm/loaders/STLLoader.js";

    const container = document.getElementById("viewer");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f6f3);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(120, 80, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 20, 0);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x999999, 1.2);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
    dirLight.position.set(80, 120, 60);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(300, 30, 0x888888, 0xcccccc);
    scene.add(grid);

    const axes = new THREE.AxesHelper(40);
    scene.add(axes);

    const loader = new STLLoader();
    loader.load(
      "bd1-part.stl", // remplace par ton vrai fichier
      (geometry) => {
        geometry.computeVertexNormals();
        geometry.center();

        const material = new THREE.MeshStandardMaterial({
          color: 0x8fa3ad,
          metalness: 0.15,
          roughness: 0.65
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const box = new THREE.Box3().setFromObject(mesh);
        const size = box.getSize(new THREE.Vector3()).length();
        const center = box.getCenter(new THREE.Vector3());

        controls.target.copy(center);
        camera.position.set(center.x + size * 0.8, center.y + size * 0.5, center.z + size * 0.8);
        camera.lookAt(center);
      },
      undefined,
      (error) => {
        console.error("Erreur de chargement STL :", error);
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
