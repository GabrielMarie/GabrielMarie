<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard visiteurs rétro stable</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#111;--panel:#171717;--line:#fff;--text:#fff;--muted:#bdbdbd}
    *{box-sizing:border-box;image-rendering:pixelated}
    body{margin:0;background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace}
    .app{max-width:1450px;margin:0 auto;padding:20px}.hidden{display:none!important}
    .gate{min-height:100vh;display:grid;place-items:center;padding:24px}.gate-card,.panel{background:var(--panel);border:4px solid var(--line)}
    .gate-card{width:min(760px,100%);padding:28px}.panel{padding:18px}.eyebrow{color:var(--muted);font-size:10px;margin-bottom:14px;text-transform:uppercase}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}
    h1,h2,h3{margin:0 0 12px;text-transform:uppercase;line-height:1.5}h1{font-size:28px}h2{font-size:24px}h3{font-size:14px}
    p,div,td,th,input,button,select{font-size:11px}input,button,select{font-family:'Press Start 2P',monospace;border:3px solid #fff;background:#111;color:#fff;padding:12px;border-radius:0}
    button{cursor:pointer;background:#222}button:hover,.tab-btn.active{background:#fff;color:#111}.ghost-btn{background:#111}.danger-btn{background:#3a1111}
    .row,.filters,.tabs{display:flex;gap:10px;flex-wrap:wrap}.stats{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:18px}.stat .label{color:var(--muted)}.stat .value{font-size:24px;margin-top:12px}
    .tab-panel{display:none}.tab-panel.active{display:block}.split{display:grid;grid-template-columns:340px 1fr;gap:16px}.grid-2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.kpi{border:3px solid #fff;padding:14px;background:#111}.kpi .small{color:var(--muted)}.kpi .big{font-size:16px;margin-top:10px;line-height:1.5}
    table{width:100%;border-collapse:collapse}th,td{padding:10px 8px;border-bottom:2px solid #333;text-align:left;vertical-align:top}th{color:var(--muted);text-transform:uppercase}.table-wrap{overflow:auto;max-height:70vh}
    .visitor-item{padding:12px;border:3px solid #fff;background:#111;cursor:pointer;margin-bottom:10px}.visitor-item.active,.visitor-item:hover{background:#fff;color:#111}.visitor-item.active .mini,.visitor-item:hover .mini{color:#333}.mini{color:var(--muted);line-height:1.7}.message{margin-top:12px;padding:12px;border:3px solid #fff;display:none}.message.show{display:block}.message.error{background:#3a1111}.message.ok{background:#123312}
    canvas{width:100%!important;min-height:320px;max-height:400px;background:#222;border:3px solid #fff;padding:10px}.badge{display:inline-flex;gap:8px;align-items:center;border:3px solid #fff;padding:8px 10px;background:#111;color:var(--muted)}.dot{width:10px;height:10px;border:2px solid #fff;display:inline-block}
    @media (max-width:1100px){.split,.grid-2,.kpis{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="gate" class="gate">
    <div class="gate-card">
      <div class="eyebrow">Analyse visiteurs</div>
      <h1>Dashboard visiteurs rétro</h1>
      <label for="tokenInput">Token admin</label>
      <input id="tokenInput" type="password" placeholder="Entre ton token ici" />
      <div class="row" style="margin-top:14px;"><button id="loginBtn">Entrer</button></div>
      <div id="gateMessage" class="message"></div>
    </div>
  </div>

  <main id="app" class="app hidden">
    <div class="topbar">
      <div>
        <div class="eyebrow">visitor-traker.gabriel-saint-gelais.workers.dev</div>
        <h2>Dashboard visiteurs</h2>
      </div>
      <div class="row"><button class="ghost-btn" id="refreshBtn">Rafraîchir</button><button class="ghost-btn" id="logoutBtn">Changer de token</button></div>
    </div>

    <section class="stats">
      <div class="panel stat"><div class="label">Visiteurs aujourd'hui</div><div class="value" id="statTodayVisitors">0</div></div>
    </section>

    <nav class="tabs" id="tabs"></nav>
    <section id="tab-feed" class="tab-panel active"></section>
    <section id="tab-visitors" class="tab-panel"></section>
    <section id="tab-trends" class="tab-panel"></section>
    <section id="tab-bonus" class="tab-panel"></section>
    <section id="tab-pages" class="tab-panel"></section>
  </main>

  <script>
    const WORKER_URL = 'https://visitor-traker.gabriel-saint-gelais.workers.dev';
    const STORAGE_KEY = 'visitor_dashboard_token';
    const NAME_KEY = 'visitor_dashboard_names_v1';
    const BLOCK_KEY = 'visitor_dashboard_blocked_v1';
    const COLOR_POOL = ['#7dd3fc','#86efac','#fca5a5','#fde68a','#c4b5fd','#f9a8d4','#fdba74','#67e8f9'];

    const state = { token:'', rawLogs:[], visits:[], visitors:[], names:loadJson(NAME_KEY,{}), blocked:loadJson(BLOCK_KEY,[]), selectedVisitorId:null, charts:{} };
    const tabs = [
      {id:'feed',label:'Toutes les données'},
      {id:'visitors',label:'Visiteurs'},
      {id:'trends',label:'Tendances'},
      {id:'bonus',label:'Bonus'},
      {id:'pages',label:'Pages'}
    ];

    init();

    function init(){
      renderTabs();
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
      document.getElementById('refreshBtn').addEventListener('click', () => loadLogs(true));
      document.getElementById('logoutBtn').addEventListener('click', logout);
      const saved = safeGet(STORAGE_KEY); if(saved) document.getElementById('tokenInput').value = saved;
    }

    function renderTabs(){
      const el = document.getElementById('tabs');
      el.innerHTML = tabs.map((t,i)=>`<button class="tab-btn ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
      el.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', ()=>activateTab(btn.dataset.tab)));
    }

    function activateTab(id){
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab===id));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id===`tab-${id}`));
    }

    async function handleLogin(){
      const token = document.getElementById('tokenInput').value.trim();
      if(!token) return gateMessage('Entre ton token.', true);
      state.token = token; safeSet(STORAGE_KEY, token); await loadLogs(false);
    }

    async function loadLogs(isRefresh){
      try {
        const res = await fetch(`${WORKER_URL}/logs?token=${encodeURIComponent(state.token)}`);
        if(!res.ok) return gateMessage(`Erreur ${res.status}`, true);
        state.rawLogs = await res.json();
        normalizeData();
        renderDashboard();
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        if(isRefresh) gateMessage('Rafraîchi.', false);
      } catch(e){ gateMessage(`Erreur réseau: ${e.message}`, true); }
    }

    function normalizeData(){
      const visits = (Array.isArray(state.rawLogs) ? state.rawLogs : []).map((log, index) => {
        const time = log.time || log.timestamp || null;
        const date = time ? new Date(time) : null;
        const ts = date && !Number.isNaN(date.getTime()) ? date.getTime() : 0;
        const cookieId = log.cookieVisitorId || '';
        const ip = log.ip || 'IP inconnue';
        const ua = log.ua || log.userAgent || '';
        const baseKey = [ip, ua, log.country || '', log.city || ''].join('||');
        const key = baseKey; // primaire : IP+appareil

        return {
          id:`visit-${index}`,
          time, date, ts,
          page:(log.page || '/').trim() || '/',
          ip, ua,
          referrer: log.referrer || log.ref || '',
          country: log.country || '', city: log.city || '',
          device: log.device || detectDevice(ua),
          browser: log.browser || detectBrowser(ua),
          os: log.os || detectOS(ua),
          visitorKey:key,
          baseKey: baseKey,
          cookieVisitorId: cookieId
        };
      }).filter(v=>v.ts).sort((a,b)=>a.ts-b.ts);

      const map = new Map();
      visits.forEach(v => {
        if(!map.has(v.visitorKey)) {
          const id = `V${String(map.size+1).padStart(3,'0')}`;
          map.set(v.visitorKey, { id, key:v.visitorKey, visits:[], ips:new Set(), pages:{}, referrers:{}, ua:v.ua, device:v.device, browser:v.browser, os:v.os, country:v.country, city:v.city, firstSeen:v.ts, lastSeen:v.ts });
        }
        const visitor = map.get(v.visitorKey);
        visitor.visits.push(v);
        visitor.ips.add(v.ip);
        visitor.pages[v.page] = (visitor.pages[v.page] || 0) + 1;
        if(v.referrer) visitor.referrers[v.referrer] = (visitor.referrers[v.referrer] || 0) + 1;
        visitor.lastSeen = Math.max(visitor.lastSeen, v.ts);
        visitor.firstSeen = Math.min(visitor.firstSeen, v.ts);
      });

      let visitors = Array.from(map.values()).map((v, idx) => {
      const cookieGroups = {};
        v.name = state.names[v.id] || '';
        v.label = v.name || `Visiteur ${v.id}`;
        v.totalVisits = v.visits.length;
        v.color = COLOR_POOL[idx % COLOR_POOL.length];
        v.ip = Array.from(v.ips).join(' | ');
        v.mainPage = topEntry(v.pages)?.key || '—';
        v.mainReferrer = topEntry(v.referrers)?.key || '—';
        v.visits.forEach((visit, i) => { visit.visitorId = v.id; visit.visitorLabel = v.label; visit.visitNumber = i+1; });
        return v;
      });

      visitors = visitors.filter(v => !state.blocked.includes(v.id));
      const allowedIds = new Set(visitors.map(v => v.id));
      state.visits = visits.filter(v => allowedIds.has(v.visitorId));
      state.visitors = visitors.sort((a,b)=>b.lastSeen-a.lastSeen);
      if(!state.selectedVisitorId || !state.visitors.some(v=>v.id===state.selectedVisitorId)) state.selectedVisitorId = state.visitors[0]?.id || null;
    }

    function renderDashboard(){ renderStats(); renderFeed(); renderVisitors(); renderTrends(); renderBonus(); renderPages(); }

    function renderStats(){
      const todayKey = new Date().toISOString().slice(0,10);
      const count = new Set(state.visits.filter(v => v.time && v.time.slice(0,10) === todayKey).map(v => v.visitorId)).size;
      document.getElementById('statTodayVisitors').textContent = count;
    }

    function renderFeed(){
      document.getElementById('tab-feed').innerHTML = `
      <div class="panel"><h3>Fil complet des visites</h3><div class="table-wrap"><table><thead><tr><th>Heure</th><th>Page</th><th>Visiteur</th><th>#</th><th>IP</th></tr></thead><tbody>
      ${[...state.visits].sort((a,b)=>b.ts-a.ts).map(v => `<tr><td>${formatDate(v.date)}</td><td>${escapeHtml(v.page)}</td><td><button class="ghost-btn jump-btn" data-id="${v.visitorId}">${escapeHtml(v.visitorLabel)}</button></td><td>${v.visitNumber}</td><td>${escapeHtml(v.ip)}</td></tr>`).join('') || '<tr><td colspan="5">Aucune donnée.</td></tr>'}
      </tbody></table></div></div>`;
      bindJumpButtons();
    }

    function renderVisitors(){
      const selected = state.visitors.find(v => v.id === state.selectedVisitorId) || null;
      document.getElementById('tab-visitors').innerHTML = `
      <div class="split">
        <div class="panel">
          <h3>Liste des visiteurs</h3>
          ${state.visitors.map(v => `<div class="visitor-item ${selected?.id===v.id?'active':''}" data-visitor="${v.id}"><strong>${escapeHtml(v.label)}</strong><div class="mini">${v.totalVisits} visites</div><div class="mini">Dernière visite: ${formatDate(new Date(v.lastSeen))}</div></div>`).join('') || '<div class="mini">Aucun visiteur.</div>'}
        </div>
        <div class="panel">
          ${selected ? renderVisitorDetail(selected) : '<h3>Fiche du visiteur</h3><div class="mini">Sélectionne un visiteur.</div>'}
        </div>
      </div>`;
      document.querySelectorAll('[data-visitor]').forEach(el => el.addEventListener('click', () => { state.selectedVisitorId = el.dataset.visitor; renderVisitors(); activateTab('visitors'); }));
      if(selected){
        document.getElementById('saveVisitorNameBtn').addEventListener('click', ()=>saveVisitorName(selected.id));
        document.getElementById('blockVisitorBtn').addEventListener('click', ()=>blockVisitor(selected.id));
        drawVisitorChart(selected);
      }
    }

    function renderVisitorDetail(v){
      return `
        <h3>Fiche du visiteur</h3>
        <div class="kpis">
          <div class="kpi"><div class="small">Nom</div><div class="big">${escapeHtml(v.label)}</div></div>
          <div class="kpi"><div class="small">Total visites</div><div class="big">${v.totalVisits}</div></div>
          <div class="kpi"><div class="small">Dernière visite</div><div class="big">${formatDate(new Date(v.lastSeen))}</div></div>
        </div>
        <div class="row" style="margin-bottom:12px"><input id="visitorNameInput" type="text" placeholder="Nom du visiteur" value="${escapeHtml(v.name || '')}"><button id="saveVisitorNameBtn">Enregistrer</button><button id="blockVisitorBtn" class="danger-btn">Bloquer</button></div>
        <canvas id="visitorTimelineChart"></canvas>
        <div class="grid-2" style="margin-top:16px">
          <div class="panel"><h3>Pages du visiteur</h3>${renderPageTable(v.pages)}</div>
          <div class="panel"><h3>Infos visiteur</h3>${renderInfoTable(v)}</div>
        </div>`;
    }

    function renderPageTable(pages){
      const rows = Object.entries(pages || {}).sort((a,b)=>b[1]-a[1]);
      return `<div class="table-wrap"><table><thead><tr><th>Page</th><th>Visites</th></tr></thead><tbody>${rows.map(([page,val])=>`<tr><td>${escapeHtml(page)}</td><td>${val}</td></tr>`).join('') || '<tr><td colspan="2">Aucune donnée.</td></tr>'}</tbody></table></div>`;
    }

    function renderInfoTable(v){
      const rows = [
        ['Appareil', v.device || '—'],
        ['Navigateur', v.browser || '—'],
        ['Système', v.os || '—'],
        ['IP / IPs', v.ip || '—'],
        ['Ville', v.city || '—'],
        ['Pays', v.country || '—'],
        ['Referrer principal', v.mainReferrer || '—']
      ];
      return `<div class="table-wrap"><table><tbody>${rows.map(([k,val])=>`<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(val)}</td></tr>`).join('')}</tbody></table></div>`;
    }

    function renderTrends(){
      document.getElementById('tab-trends').innerHTML = `<div class="panel"><h3>Tendance globale</h3><canvas id="globalChart"></canvas></div>`;
      const grouped = groupByDay(state.visits);
      upsertChart('globalChart',{type:'bar',data:{labels:grouped.map(x=>x.label),datasets:[{label:'Visites',data:grouped.map(x=>x.count),backgroundColor:'#7dd3fc99',borderColor:'#7dd3fc',borderWidth:1}]},options:chartOptions('Visites par jour')});
    }

    function renderBonus(){
      const topPage = topEntry(countBy(state.visits, v=>v.page));
      const topHour = topEntry(countBy(state.visits, v=>`${v.date.getHours()}h`));
      const topRef = topEntry(countBy(state.visits.filter(v=>v.referrer), v=>v.referrer));
      const topVisitors = [...state.visitors].sort((a,b)=>b.totalVisits-a.totalVisits);
      document.getElementById('tab-bonus').innerHTML = `
      <div class="grid-2">
        <div class="panel"><h3>Bonus</h3><div class="table-wrap"><table><tbody>
          <tr><td>Page la plus visitée</td><td>${escapeHtml(topPage?.key || '—')}</td><td>${topPage?.value || 0}</td></tr>
          <tr><td>Heure la plus active</td><td>${escapeHtml(topHour?.key || '—')}</td><td>${topHour?.value || 0}</td></tr>
          <tr><td>Referrer top</td><td>${escapeHtml(topRef?.key || '—')}</td><td>${topRef?.value || 0}</td></tr>
          <tr><td>Total visites</td><td>${state.visits.length}</td><td></td></tr>
          <tr><td>Visiteurs distincts</td><td>${state.visitors.length}</td><td></td></tr>
        </tbody></table></div></div>
        <div class="panel"><h3>Top visiteurs</h3><div class="table-wrap"><table><thead><tr><th>Visiteur</th><th>Visites</th><th>Page</th></tr></thead><tbody>
        ${topVisitors.map(v=>`<tr><td>${escapeHtml(v.label)}</td><td>${v.totalVisits}</td><td>${escapeHtml(v.mainPage)}</td></tr>`).join('') || '<tr><td colspan="3">Aucun résultat.</td></tr>'}
        </tbody></table></div></div>
      </div>`;
    }

    function renderPages(){
      const pagesMap = new Map();
      state.visits.forEach(v => {
        if(!pagesMap.has(v.page)) pagesMap.set(v.page,{page:v.page,total:0,visitors:new Set(),last:v.ts});
        const row = pagesMap.get(v.page); row.total += 1; row.visitors.add(v.visitorId); row.last = Math.max(row.last, v.ts);
      });
      const pages = Array.from(pagesMap.values()).map(p=>({...p,visitorsCount:p.visitors.size})).sort((a,b)=>b.total-a.total);
      document.getElementById('tab-pages').innerHTML = `<div class="grid-2"><div class="panel"><h3>Pages performantes</h3><canvas id="pagesChart"></canvas></div><div class="panel"><h3>Détail par page</h3><div class="table-wrap"><table><thead><tr><th>Page</th><th>Visites</th><th>Visiteurs</th><th>Dernière</th></tr></thead><tbody>${pages.map(p=>`<tr><td>${escapeHtml(p.page)}</td><td>${p.total}</td><td>${p.visitorsCount}</td><td>${formatDate(new Date(p.last))}</td></tr>`).join('') || '<tr><td colspan="4">Aucune page.</td></tr>'}</tbody></table></div></div></div>`;
      upsertChart('pagesChart',{type:'bar',data:{labels:pages.slice(0,10).map(p=>p.page),datasets:[{label:'Visites',data:pages.slice(0,10).map(p=>p.total),backgroundColor:'#86efac99',borderColor:'#86efac',borderWidth:1},{label:'Visiteurs',data:pages.slice(0,10).map(p=>p.visitorsCount),backgroundColor:'#c4b5fd99',borderColor:'#c4b5fd',borderWidth:1}]},options:chartOptions('Performance des pages')});
    }

    function drawVisitorChart(visitor){
      const grouped = groupByHour(visitor.visits);
      upsertChart('visitorTimelineChart',{type:'line',data:{labels:grouped.map(x=>x.label),datasets:[{label:visitor.label,data:grouped.map(x=>x.count),borderColor:visitor.color,backgroundColor:visitor.color+'33',pointRadius:3,tension:.2}]},options:chartOptions('Visites par heure')});
    }

    function bindJumpButtons(){ document.querySelectorAll('.jump-btn').forEach(btn => btn.addEventListener('click', ()=>{ state.selectedVisitorId = btn.dataset.id; renderVisitors(); activateTab('visitors'); })); }
    function saveVisitorName(id){ const val = document.getElementById('visitorNameInput').value.trim(); if(val) state.names[id]=val; else delete state.names[id]; safeSet(NAME_KEY, JSON.stringify(state.names)); normalizeData(); renderDashboard(); activateTab('visitors'); }
    function blockVisitor(id){ state.blocked = state.blocked.filter(x=>x!==id).concat(id); safeSet(BLOCK_KEY, JSON.stringify(state.blocked)); normalizeData(); renderDashboard(); activateTab('visitors'); }

    function groupByDay(visits){ const counts={}; visits.forEach(v=>{const d=new Date(v.ts); const key=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; counts[key]=(counts[key]||0)+1;}); return Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0])).map(([label,count])=>({label,count})); }
    function groupByHour(visits){ const counts={}; visits.forEach(v=>{const d=new Date(v.ts); const key=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:00`; counts[key]=(counts[key]||0)+1;}); return Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0])).map(([label,count])=>({label,count})); }
    function countBy(arr, fn){ return arr.reduce((acc,item)=>{const key=fn(item); acc[key]=(acc[key]||0)+1; return acc;},{}); }
    function topEntry(obj){ const entries=Object.entries(obj||{}); if(!entries.length) return null; entries.sort((a,b)=>b[1]-a[1]); return {key:entries[0][0], value:entries[0][1]}; }
    function chartOptions(title){ return {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#f4f4f4'}},title:{display:true,text:title,color:'#f4f4f4'}},scales:{x:{ticks:{color:'#b3b3b3'},grid:{color:'#242424'}},y:{ticks:{color:'#b3b3b3',precision:0},grid:{color:'#242424'},beginAtZero:true}}}; }
    function upsertChart(id, config){ if(state.charts[id]) state.charts[id].destroy(); const el=document.getElementById(id); if(!el) return; state.charts[id] = new Chart(el.getContext('2d'), config); }
    function detectDevice(ua){ const t=(ua||'').toLowerCase(); if(/ipad|tablet/.test(t)) return 'Tablette'; if(/mobile|android|iphone|ipod/.test(t)) return 'Mobile'; return 'Ordinateur'; }
    function detectBrowser(ua){ const t=(ua||'').toLowerCase(); if(t.includes('edg/')) return 'Edge'; if(t.includes('firefox/')) return 'Firefox'; if(t.includes('chrome/') && !t.includes('edg/')) return 'Chrome'; if(t.includes('safari/') && !t.includes('chrome/')) return 'Safari'; return 'Inconnu'; }
    function detectOS(ua){ const t=(ua||'').toLowerCase(); if(t.includes('windows')) return 'Windows'; if(t.includes('android')) return 'Android'; if(t.includes('iphone')||t.includes('ipad')||t.includes('ios')) return 'iOS'; if(t.includes('mac os')||t.includes('macintosh')) return 'macOS'; if(t.includes('linux')) return 'Linux'; return 'Inconnu'; }
    function formatDate(d){ try{return d.toLocaleString('fr-CA')}catch{return '—'} }
    function pad(n){ return String(n).padStart(2,'0'); }
    function escapeHtml(str){ return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
    function gateMessage(text, error){ const el=document.getElementById('gateMessage'); el.textContent=text; el.className=`message show ${error?'error':'ok'}`; }
    function logout(){ safeRemove(STORAGE_KEY); state.token=''; document.getElementById('app').classList.add('hidden'); document.getElementById('gate').classList.remove('hidden'); document.getElementById('tokenInput').value=''; }
    function loadJson(key, fallback){ try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); } catch { return fallback; } }
    function safeSet(key, value){ try{ localStorage.setItem(key,value);}catch{} }
    function safeGet(key){ try{ return localStorage.getItem(key)||'';}catch{return ''} }
    function safeRemove(key){ try{ localStorage.removeItem(key);}catch{} }
  </script>
</body>
</html>
